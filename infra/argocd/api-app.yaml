apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
name: api
namespace: argocd
spec:
project: default
source:
repoURL: [https://github.com/OWNER/REPO.git](https://github.com/OWNER/REPO.git)
targetRevision: main
path: infra/helm/api
destination:
server: [https://kubernetes.default.svc](https://kubernetes.default.svc)
namespace: api
syncPolicy:
automated:
prune: true
selfHeal: true
syncOptions:
- CreateNamespace=true
