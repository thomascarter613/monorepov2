projects:
  globFormat: 'source-path'
  globs:
    - 'apps/*'
    - 'services/*'
    - 'packages/*'

vcs:
  provider: 'github'
  defaultBranch: 'main'

codeowners:
  sync: true
  globalPaths:
    '*': ['@thomas.carter']
    '/.github/': ['@thomas.carter']
    '/infra/': ['@thomas.carter']
    '/docs/adr/': ['@thomas.carter']

constraints:
  enforceLayerRelationships: true

pipeline:
  installDependencies: false
  cacheLifetime: '7 days'
